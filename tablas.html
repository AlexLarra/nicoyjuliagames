<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tablas de multiplicar</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #0b1324;
      --accent: #4ade80;
      --accent-strong: #16a34a;
      --muted: #cbd5e1;
      --text: #e2e8f0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Inter', 'Nunito', system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at 20% 20%, rgba(74, 222, 128, 0.14), transparent 35%),
                  radial-gradient(circle at 80% 0%, rgba(59, 130, 246, 0.18), transparent 32%),
                  linear-gradient(135deg, #0b1020, #0f172a 50%, #111827);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(16px, 4vw, 32px);
    }

    .app {
      width: min(960px, 100%);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));
      border: 1px solid rgba(148, 163, 184, 0.2);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      border-radius: 24px;
      padding: clamp(20px, 4vw, 32px);
      backdrop-filter: blur(6px);
    }

    header {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 18px;
    }

    .back-link {
      width: fit-content;
      color: var(--muted);
      text-decoration: none;
      font-weight: 700;
      letter-spacing: 0.01em;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      transition: border 0.2s ease, transform 0.2s ease;
    }

    .back-link:hover {
      border-color: rgba(74, 222, 128, 0.6);
      transform: translateY(-1px);
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 38px);
      letter-spacing: 0.01em;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.5;
    }

    .card {
      background: var(--card);
      border-radius: 20px;
      padding: clamp(18px, 3vw, 26px);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04), 0 20px 50px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(148, 163, 184, 0.18);
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .question-box {
      margin: 18px 0;
      padding: 24px;
      background: linear-gradient(135deg, rgba(74, 222, 128, 0.12), rgba(59, 130, 246, 0.08));
      border-radius: 18px;
      text-align: center;
      border: 1px solid rgba(74, 222, 128, 0.25);
      box-shadow: 0 16px 40px rgba(74, 222, 128, 0.12);
    }

    #question {
      font-size: clamp(34px, 8vw, 54px);
      font-weight: 800;
      margin: 0;
      letter-spacing: 0.04em;
    }

    form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      margin: 10px 0 8px 0;
    }

    input[type="number"] {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      background: rgba(15, 23, 42, 0.7);
      color: var(--text);
      font-size: 18px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 14px 18px;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: #052e16;
      font-weight: 800;
      font-size: 16px;
      letter-spacing: 0.01em;
      cursor: pointer;
      box-shadow: 0 14px 30px rgba(34, 197, 94, 0.35);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 40px rgba(34, 197, 94, 0.4);
    }

    button:active {
      transform: translateY(0);
      box-shadow: 0 8px 16px rgba(34, 197, 94, 0.3);
    }

    #feedback {
      min-height: 28px;
      margin-top: 6px;
      font-weight: 700;
    }

    .feedback-ok {
      color: #4ade80;
    }

    .feedback-bad {
      color: #fca5a5;
    }

    #summary {
      margin-top: 18px;
      border-top: 1px solid rgba(148, 163, 184, 0.25);
      padding-top: 16px;
      display: none;
    }

    #summary h2 {
      margin: 0 0 8px 0;
      font-size: 22px;
    }

    #summary p {
      margin: 6px 0;
      color: var(--muted);
    }

    #mistakes {
      list-style: none;
      padding: 0;
      margin: 8px 0 0 0;
      display: grid;
      gap: 6px;
    }

    #mistakes li {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 12px;
      padding: 10px 12px;
      color: var(--text);
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .secondary {
      background: rgba(148, 163, 184, 0.18);
      color: var(--text);
      box-shadow: none;
    }

    @media (max-width: 640px) {
      form {
        grid-template-columns: 1fr;
      }

      .status-row {
        flex-direction: column;
        align-items: flex-start;
      }

      .actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <a class="back-link" href="index.html">&#x2190; Volver</a>
      <h1>Tablas de multiplicar</h1>
      <p class="subtitle">Responde 10 preguntas de las tablas del 1 al 10. Después verás en qué fallaste para repasarlo.</p>
    </header>

    <div class="card">
      <div class="status-row">
        <span id="progress">Pregunta 1 de 10</span>
        <span id="score">Aciertos: 0</span>
      </div>

      <div class="question-box">
        <p id="question">1 × 1 = ?</p>
      </div>

      <form id="answer-form">
        <input type="number" id="answer" autocomplete="off" placeholder="Tu respuesta" required />
        <button type="submit">Responder</button>
      </form>

      <div id="feedback"></div>

      <div id="summary">
        <h2>Resultado final</h2>
        <p id="final-score"></p>
        <p id="mistake-title" style="display:none;">Repasa estos ejercicios:</p>
        <ul id="mistakes"></ul>
      </div>

      <div class="actions">
        <button id="restart" class="secondary" type="button">Volver a jugar</button>
      </div>
    </div>
  </div>

  <script>
    const totalQuestions = 10;
    let questions = [];
    let current = 0;
    let score = 0;
    let wrongAnswers = [];
    let finished = false;

    const questionEl = document.getElementById('question');
    const progressEl = document.getElementById('progress');
    const scoreEl = document.getElementById('score');
    const feedbackEl = document.getElementById('feedback');
    const answerInput = document.getElementById('answer');
    const form = document.getElementById('answer-form');
    const summaryEl = document.getElementById('summary');
    const finalScoreEl = document.getElementById('final-score');
    const mistakesList = document.getElementById('mistakes');
    const mistakeTitle = document.getElementById('mistake-title');
    const restartBtn = document.getElementById('restart');

    function randomTableQuestion() {
      const a = Math.floor(Math.random() * 10) + 1;
      const b = Math.floor(Math.random() * 10) + 1;
      return { a, b, answer: a * b };
    }

    function createQuestionSet() {
      const set = new Set();
      const list = [];

      while (list.length < totalQuestions) {
        const q = randomTableQuestion();
        const key = `${q.a}x${q.b}`;
        if (!set.has(key)) {
          set.add(key);
          list.push(q);
        }
      }

      return list.sort(() => Math.random() - 0.5);
    }

    function showQuestion() {
      const q = questions[current];
      questionEl.textContent = `${q.a} × ${q.b} = ?`;
      progressEl.textContent = `Pregunta ${current + 1} de ${totalQuestions}`;
      scoreEl.textContent = `Aciertos: ${score}`;
      feedbackEl.textContent = '';
      feedbackEl.className = '';
      answerInput.value = '';
      answerInput.focus();
    }

    function handleAnswer(event) {
      event.preventDefault();
      if (finished) return;

      const q = questions[current];
      const userValue = parseInt(answerInput.value, 10);

      if (Number.isNaN(userValue)) {
        feedbackEl.textContent = 'Escribe un número para responder.';
        feedbackEl.className = 'feedback-bad';
        answerInput.focus();
        return;
      }

      if (userValue === q.answer) {
        score += 1;
        feedbackEl.textContent = `¡Genial! ${q.a} × ${q.b} = ${q.answer}.`;
        feedbackEl.className = 'feedback-ok';
      } else {
        wrongAnswers.push({ ...q, user: userValue });
        feedbackEl.textContent = `No es correcto. ${q.a} × ${q.b} = ${q.answer}.`;
        feedbackEl.className = 'feedback-bad';
      }

      current += 1;

      if (current >= totalQuestions) {
        finishGame();
      } else {
        showQuestion();
      }
    }

    function finishGame() {
      finished = true;
      progressEl.textContent = `Preguntas terminadas`;
      scoreEl.textContent = `Aciertos: ${score} de ${totalQuestions}`;
      summaryEl.style.display = 'block';
      finalScoreEl.textContent = `Has acertado ${score} de ${totalQuestions}.`;

      mistakesList.innerHTML = '';
      if (wrongAnswers.length === 0) {
        mistakeTitle.style.display = 'none';
        const item = document.createElement('li');
        item.textContent = '¡Lo has clavado todo!';
        mistakesList.appendChild(item);
      } else {
        mistakeTitle.style.display = 'block';
        wrongAnswers.forEach(({ a, b, answer, user }) => {
          const item = document.createElement('li');
          item.textContent = `${a} × ${b} = ${answer}. Tú pusiste ${user}.`;
          mistakesList.appendChild(item);
        });
      }
    }

    function restartGame() {
      questions = createQuestionSet();
      current = 0;
      score = 0;
      wrongAnswers = [];
      finished = false;
      summaryEl.style.display = 'none';
      mistakeTitle.style.display = 'none';
      mistakesList.innerHTML = '';
      showQuestion();
    }

    form.addEventListener('submit', handleAnswer);
    restartBtn.addEventListener('click', restartGame);

    restartGame();
  </script>
</body>
</html>
